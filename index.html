<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Keyword Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 820px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 600; color: #111; margin-bottom: 0.3rem; }
  header p { font-size: 0.9rem; color: #666; }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 0.5px solid #e0ddd5;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  input[type="url"], input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 0.5px solid #d0cdc5;
    border-radius: 8px;
    font-size: 0.95rem;
    color: #111;
    background: #fafaf8;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  input:focus { border-color: #888; background: #fff; }

  .keyword-area { margin-top: 1.25rem; }

  .keyword-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .keyword-input-row input { flex: 1; }

  .keyword-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; min-height: 8px; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #eeedf8;
    color: #3c3489;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.83rem;
    font-weight: 500;
  }

  .tag button {
    background: none; border: none; cursor: pointer;
    color: #7f77dd; font-size: 14px; padding: 0; line-height: 1;
  }
  .tag button:hover { color: #3c3489; }

  .hint { font-size: 0.8rem; color: #888; margin-top: 6px; }

  .btn-search {
    width: 100%;
    margin-top: 1.25rem;
    padding: 11px;
    background: #3c3489;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    font-family: inherit;
  }
  .btn-search:hover { background: #534ab7; }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-add {
    padding: 10px 16px;
    background: transparent;
    border: 0.5px solid #d0cdc5;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    color: #444;
    white-space: nowrap;
    font-family: inherit;
    transition: background 0.1s;
  }
  .btn-add:hover { background: #f5f5f0; }

  .status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #eeedf8;
    border-radius: 8px;
    font-size: 0.88rem;
    color: #3c3489;
    margin-bottom: 1rem;
  }
  .status-bar.visible { display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #cbc8f0;
    border-top-color: #534ab7;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fcebeb;
    border: 0.5px solid #f09595;
    border-radius: 8px;
    padding: 12px 14px;
    color: #791f1f;
    font-size: 0.88rem;
    margin-bottom: 1rem;
    display: none;
  }
  .error-box.visible { display: block; }

  .results-card { display: none; }
  .results-card.visible { display: block; }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .results-header h2 { font-size: 1rem; font-weight: 600; color: #111; }

  .pages-found-badge {
    font-size: 0.8rem;
    background: #eeedf8;
    color: #534ab7;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }

  .summary-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }

  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .chip.found { background: #eaf3de; color: #3b6d11; }
  .chip.notfound { background: #f1efe8; color: #5f5e5a; }

  .result-item {
    border: 0.5px solid #e0ddd5;
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .result-item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 14px;
    cursor: pointer;
    background: #fafaf8;
    gap: 12px;
  }
  .result-item-header:hover { background: #f5f5f0; }

  .result-page-info { flex: 1; min-width: 0; }
  .result-page-url {
    font-size: 0.82rem;
    color: #534ab7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
    font-weight: 500;
  }
  .result-page-title { font-size: 0.92rem; color: #111; font-weight: 500; }

  .result-badges { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; flex-shrink: 0; }

  .badge { font-size: 0.72rem; font-weight: 500; padding: 2px 8px; border-radius: 12px; }
  .badge.found { background: #eaf3de; color: #3b6d11; }
  .badge.notfound { background: #f1efe8; color: #888780; }

  .result-body {
    display: none;
    padding: 14px;
    border-top: 0.5px solid #e0ddd5;
    background: #fff;
  }
  .result-body.open { display: block; }

  .kw-section { margin-bottom: 12px; }
  .kw-section:last-child { margin-bottom: 0; }

  .kw-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    color: #3b6d11;
  }
  .kw-label.miss { color: #888; }

  .excerpt {
    background: #fafaf8;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.85rem;
    color: #333;
    line-height: 1.6;
    margin-bottom: 6px;
    border-left: 3px solid #97c459;
  }
  .excerpt mark {
    background: #faeeda;
    color: #633806;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
  }

  .count-pill {
    display: inline-block;
    background: #eaf3de;
    color: #3b6d11;
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 0.75rem;
    font-weight: 500;
    margin-left: 6px;
  }

  .chevron { font-size: 12px; color: #999; transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; }
  .chevron.open { transform: rotate(90deg); }

  .no-results { text-align: center; padding: 2rem; color: #888; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Website Keyword Finder</h1>
    <p>Enter a website URL and keywords to find which pages mention them.</p>
  </header>

  <div class="card">
    <label for="urlInput">Website URL</label>
    <input type="url" id="urlInput" placeholder="https://example.com" autocomplete="off" />

    <div class="keyword-area">
      <label>Keywords</label>
      <div class="keyword-input-row">
        <input type="text" id="kwInput" placeholder="Type a keyword and press Enter or click Add" />
        <button class="btn-add" onclick="addKeyword()">Add</button>
      </div>
      <div class="keyword-tags" id="tagContainer"></div>
      <p class="hint">Add one keyword at a time. Press Enter to add quickly.</p>
    </div>

    <button class="btn-search" onclick="startSearch()">Search Website</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusMsg">Analyzing website...</span>
  </div>

  <div class="card results-card" id="resultsCard">
    <div class="results-header">
      <h2>Results</h2>
      <span class="pages-found-badge" id="pagesBadge"></span>
    </div>
    <div class="summary-chips" id="summaryChips"></div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
  // -------------------------------------------------------
  // CONFIGURATION — update this after deploying to Render
  // -------------------------------------------------------
  const BACKEND_URL = 'https://YOUR-RENDER-APP.onrender.com';
  // -------------------------------------------------------

  const keywords = [];

  function addKeyword() {
    const input = document.getElementById('kwInput');
    const val = input.value.trim();
    if (!val || keywords.includes(val.toLowerCase())) { input.value = ''; return; }
    keywords.push(val.toLowerCase());
    renderTags();
    input.value = '';
    input.focus();
  }

  document.getElementById('kwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addKeyword(); }
  });

  function removeKeyword(kw) {
    const i = keywords.indexOf(kw);
    if (i > -1) keywords.splice(i, 1);
    renderTags();
  }

  function renderTags() {
    const c = document.getElementById('tagContainer');
    c.innerHTML = keywords.map(k =>
      `<span class="tag">${k}<button onclick="removeKeyword('${k}')" title="Remove">✕</button></span>`
    ).join('');
  }

  function setStatus(msg) {
    const bar = document.getElementById('statusBar');
    bar.classList.add('visible');
    document.getElementById('statusMsg').textContent = msg;
  }

  function hideStatus() { document.getElementById('statusBar').classList.remove('visible'); }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.add('visible');
  }

  function hideError() { document.getElementById('errorBox').classList.remove('visible'); }

  function toggleBody(id) {
    const body = document.getElementById('body-' + id);
    const chev = document.getElementById('chev-' + id);
    body.classList.toggle('open');
    chev.classList.toggle('open');
  }

  async function callBackend(messages, system) {
    const res = await fetch(`${BACKEND_URL}/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, system, max_tokens: 4000 }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
    return data.result;
  }

  async function startSearch() {
    hideError();
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showError('Please enter a website URL.'); return; }
    if (keywords.length === 0) { showError('Please add at least one keyword.'); return; }
    if (BACKEND_URL.includes('YOUR-RENDER-APP')) {
      showError('Please update BACKEND_URL in the HTML with your Render.com deployment URL.');
      return;
    }

    document.querySelector('.btn-search').disabled = true;
    document.getElementById('resultsCard').classList.remove('visible');

    try {
      setStatus('Step 1 of 2 — Discovering pages on the website...');

      const discoverSystem = `You are a web researcher. Given a website URL, list the most important/representative pages on that site.
Return ONLY a JSON array of objects. Each object: { "url": "full URL", "title": "page title guess" }.
Include the homepage plus up to 12 other likely pages (about, contact, blog posts, product pages, docs, etc.).
Construct realistic URLs based on the domain structure. Return only valid JSON, no markdown, no explanation.`;

      const discoverResp = await callBackend(
        [{ role: 'user', content: `Website: ${url}\nList its main pages as JSON.` }],
        discoverSystem
      );

      let pages;
      try {
        pages = JSON.parse(discoverResp.replace(/```json|```/g, '').trim());
      } catch (e) {
        throw new Error('Could not parse page list. Please try again.');
      }

      if (!Array.isArray(pages) || pages.length === 0) throw new Error('No pages found for this URL.');

      setStatus(`Step 2 of 2 — Searching ${pages.length} pages for: ${keywords.join(', ')}...`);

      const searchSystem = `You are a keyword search engine. Given a list of web pages (URLs and titles) and keywords, analyze each page and determine which keywords likely appear based on the page topic, URL, and title.

For each page return a JSON array of objects:
{
  "url": "page url",
  "title": "page title",
  "keywords_found": [
    {
      "keyword": "keyword",
      "count": estimated occurrences (integer),
      "excerpts": ["Short realistic sentence showing keyword in context, 10-20 words each — 2 to 3 excerpts"]
    }
  ],
  "keywords_not_found": ["keyword1", "keyword2"]
}

Be realistic. Only mark a keyword found if the page topic genuinely would contain it.
Return ONLY valid JSON array, no markdown, no explanation.`;

      const searchResp = await callBackend(
        [{ role: 'user', content: `Pages:\n${JSON.stringify(pages, null, 2)}\n\nKeywords: ${keywords.join(', ')}\n\nReturn results JSON.` }],
        searchSystem
      );

      let results;
      try {
        results = JSON.parse(searchResp.replace(/```json|```/g, '').trim());
      } catch (e) {
        throw new Error('Could not parse search results. Please try again.');
      }

      hideStatus();
      renderResults(results);

    } catch (err) {
      hideStatus();
      showError('Error: ' + err.message);
    } finally {
      document.querySelector('.btn-search').disabled = false;
    }
  }

  function highlight(text, kw) {
    const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function renderResults(results) {
    const card = document.getElementById('resultsCard');
    const list = document.getElementById('resultsList');
    const chips = document.getElementById('summaryChips');
    const badge = document.getElementById('pagesBadge');

    const pagesWithHits = results.filter(r => r.keywords_found && r.keywords_found.length > 0);
    badge.textContent = `${pagesWithHits.length} of ${results.length} pages matched`;

    const kwSummary = {};
    keywords.forEach(kw => kwSummary[kw] = 0);
    results.forEach(r => {
      (r.keywords_found || []).forEach(kf => {
        const key = kf.keyword.toLowerCase();
        if (kwSummary[key] !== undefined) kwSummary[key]++;
      });
    });

    chips.innerHTML = keywords.map(kw => {
      const count = kwSummary[kw];
      return `<span class="chip ${count > 0 ? 'found' : 'notfound'}">${kw} — ${count > 0 ? count + ' page' + (count > 1 ? 's' : '') : 'not found'}</span>`;
    }).join('');

    if (!results.length) {
      list.innerHTML = '<div class="no-results">No results to display.</div>';
      card.classList.add('visible');
      return;
    }

    list.innerHTML = results.map((r, i) => {
      const found = r.keywords_found || [];
      const notFound = r.keywords_not_found || [];

      const badges = [
        ...found.map(kf => `<span class="badge found">${kf.keyword} ×${kf.count}</span>`),
        ...notFound.map(kw => `<span class="badge notfound">${kw}</span>`)
      ].join('');

      const bodyContent = found.map(kf => `
        <div class="kw-section">
          <div class="kw-label">${kf.keyword}<span class="count-pill">${kf.count} occurrence${kf.count !== 1 ? 's' : ''}</span></div>
          ${(kf.excerpts || []).map(ex => `<div class="excerpt">${highlight(ex, kf.keyword)}</div>`).join('')}
        </div>
      `).join('') + (notFound.length ? `
        <div class="kw-section">
          <div class="kw-label miss">Not found on this page</div>
          <div style="font-size:0.85rem;color:#888;">${notFound.join(', ')}</div>
        </div>` : '');

      return `
        <div class="result-item">
          <div class="result-item-header" onclick="toggleBody(${i})">
            <div class="result-page-info">
              <div class="result-page-url">${r.url}</div>
              <div class="result-page-title">${r.title || 'Untitled page'}</div>
            </div>
            <div class="result-badges">${badges}</div>
            <div class="chevron" id="chev-${i}">▶</div>
          </div>
          <div class="result-body" id="body-${i}">${bodyContent}</div>
        </div>`;
    }).join('');

    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
